name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build-test-publish:
    runs-on: ubuntu-latest
    container:
      image: kubevious/node-builder:26-v1
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Prepare Dependencies
        run: pnpm install --frozen-lockfile

      - name: Compile
        run: npm run build

      - name: Run Unit Tests
        run: npm test

      - name: Publish
        if: >-
          github.ref == 'refs/heads/master' &&
          github.event_name == 'push' &&
          !contains(github.event.head_commit.message, 'Version Release')
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global user.email "cicd@kubevious.io"
          git config --global user.name "Kubevious CI/CD"

          # Bump the patch version without creating a git commit or tag yet,
          # so a failure in a later step leaves the repo in a clean state.
          npm version patch --no-git-tag-version
          NEW_VERSION="$(node -p "require('./package.json').version")"

          # Publish to npm first (the irreversible step). Skip if this version
          # is already on the registry so reruns can recover gracefully.
          if npm view "@kubevious/helpers@${NEW_VERSION}" version >/dev/null 2>&1; then
            echo "Version ${NEW_VERSION} already published, skipping npm publish."
          else
            npm publish
          fi

          # Record the release in git only after a successful publish, and push
          # the commit and tag together so master and tags never get out of sync.
          git commit -am "Version Release v${NEW_VERSION}"
          git tag "v${NEW_VERSION}"
          git push --follow-tags
